name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Check JavaScript syntax
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install static site dependencies
        working-directory: site
        run: npm ci

      - name: Validate static site bundle
        run: |
          node --check site/src/app.js
          node --check site/src/rumoca_flight.js
          node --check site/src/modelica_prediction_worker.js
          ./results.py check-site

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install static site dependencies
        working-directory: site
        run: npm ci

      - name: Vendor Rumoca browser package
        run: ./results.py vendor-rumoca

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
